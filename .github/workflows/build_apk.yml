name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Accept Android SDK licenses
      run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Install pnpm
      run: npm install -g pnpm

    - name: Grant gradlew permission
      run: chmod +x gradlew

    - name: Build APK
      run: |
        set -o pipefail
        ./gradlew :app:assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
      env:
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"
        ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        ANDROID_HOME: /usr/local/lib/android/sdk

    - name: Upload build log (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-error-log
        path: build.log
        retention-days: 3

    - name: Find APK files (debug)
      run: |
        echo "=== Find all .apk files ==="
        find . -name "*.apk" -ls 2>/dev/null || true
        echo "=== Find all .aab files ==="
        find . -name "*.aab" -ls 2>/dev/null || true
        echo "=== Build output tree ==="
        find app/build -type f 2>/dev/null | head -30 || echo "No build outputs"

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/**/*.apk
        retention-days: 7
