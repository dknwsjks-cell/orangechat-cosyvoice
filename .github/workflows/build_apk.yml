name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx6g -Dorg.gradle.configuration-cache=false -Dorg.gradle.caching=false"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 37
        build-tools: 37.0.0
        cmake: 3.22.1
        ndk: 26.1.10909125

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9.x

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'pnpm'
        cache-dependency-path: web-ui/pnpm-lock.yaml

    - name: Install web-ui dependencies
      working-directory: web-ui
      run: pnpm install --frozen-lockfile

    - name: Grant gradlew permission
      run: chmod +x gradlew

    - name: Build APK
      run: |
        set -o pipefail
        ./gradlew :app:assembleDebug --no-daemon --stacktrace --no-configuration-cache 2>&1 | tee build.log

    - name: Upload build log (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-error-log
        path: build.log
        retention-days: 3

    - name: Find APK files (debug)
      run: |
        echo "=== Find all .apk files ==="
        find . -name "*.apk" -ls 2>/dev/null || true
        echo "=== Find all .aab files ==="
        find . -name "*.aab" -ls 2>/dev/null || true
        echo "=== Build output tree ==="
        find app/build -type f 2>/dev/null | head -50 || echo "No build outputs"

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/**/*.apk
        retention-days: 7
