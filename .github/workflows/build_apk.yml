name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      run: |
        export ANDROID_HOME=$ANDROID_SDK_ROOT
        # Accept all licenses
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
        # Install needed SDK components
        $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install 'platforms;android-36' 'build-tools;36.0.0'
      env:
        ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build with Gradle
      run: ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tee build.log
      env:
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"
        ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    - name: Find APK files
      run: |
        echo "=== Searching for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null || true
        echo "=== Build output structure ==="
        find app/build/outputs -type f 2>/dev/null | head -50 || true
        echo "=== Contents of APK dir ==="
        ls -la app/build/outputs/apk/ 2>/dev/null || echo "No apk dir"
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug dir"

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 7
