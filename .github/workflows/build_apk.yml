name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      run: |
        export ANDROID_HOME=$ANDROID_SDK_ROOT
        # Accept all licenses
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
        # Install needed SDK components
        $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install 'platforms;android-37' 'build-tools;37.0.0' 'ndk;27.0.12077973'
      env:
        ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build with Gradle
      run: ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tee build.log
      env:
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"
        ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    
    - name: Upload build log (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        retention-days: 3
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
    
    - name: Upload mapping file
      uses: actions/upload-artifact@v4
      with:
        name: mapping-debug
        path: app/build/outputs/mapping/debug/mapping.txt
        retention-days: 7
